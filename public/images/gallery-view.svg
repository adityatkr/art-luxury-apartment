<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0C1018"/><stop offset="60%" stop-color="#1A2034"/><stop offset="100%" stop-color="#243050"/></linearGradient>
    <radialGradient id="city" cx="50%" cy="75%" r="60%" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#C4A040" stop-opacity="0.2"/><stop offset="100%" stop-color="#C4A040" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="700" height="500" fill="url(#sky)"/>
  <rect width="700" height="500" fill="url(#city)"/>
  <!-- Skyline -->
  <rect x="0" y="350" width="700" height="150" fill="#0C1018" fill-opacity="0.7"/>
  <rect x="40" y="300" width="35" height="200" fill="#0C1018" fill-opacity="0.65"/>
  <rect x="100" y="280" width="55" height="220" fill="#0C1018" fill-opacity="0.7"/>
  <rect x="200" y="310" width="40" height="190" fill="#0C1018" fill-opacity="0.6"/>
  <rect x="450" y="290" width="50" height="210" fill="#0C1018" fill-opacity="0.68"/>
  <rect x="530" y="270" width="60" height="230" fill="#0C1018" fill-opacity="0.72"/>
  <rect x="620" y="320" width="45" height="180" fill="#0C1018" fill-opacity="0.6"/>
  <!-- Light dots -->
  <circle cx="117" cy="295" r="1.5" fill="#F4D060" fill-opacity="0.6"/>
  <circle cx="130" cy="308" r="1.5" fill="#F4D060" fill-opacity="0.5"/>
  <circle cx="558" cy="285" r="1.5" fill="#F4D060" fill-opacity="0.6"/>
  <circle cx="545" cy="300" r="1.5" fill="#F4D060" fill-opacity="0.4"/>
  <!-- Stars -->
  <circle cx="150" cy="80" r="1" fill="white" fill-opacity="0.4"/>
  <circle cx="280" cy="50" r="1" fill="white" fill-opacity="0.35"/>
  <circle cx="420" cy="90" r="1" fill="white" fill-opacity="0.4"/>
  <circle cx="560" cy="60" r="1" fill="white" fill-opacity="0.3"/>
  <circle cx="640" cy="100" r="1" fill="white" fill-opacity="0.35"/>
  <text x="350" y="175" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#B0C0D0" fill-opacity="0.3" letter-spacing="5">CITY VIEW</text>
  <text x="350" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="white" fill-opacity="0.12" letter-spacing="2">gallery-view.jpg</text>
</svg>
