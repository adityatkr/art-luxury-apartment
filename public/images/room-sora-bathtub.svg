<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8DECE"/>
      <stop offset="55%" stop-color="#CCBA9C"/>
      <stop offset="100%" stop-color="#A88C6C"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="25%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4E0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFF4E0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="560" fill="url(#bg)"/>
  <rect width="800" height="560" fill="url(#light)"/>
  <!-- Bathtub silhouette -->
  <ellipse cx="400" cy="360" rx="220" ry="80" fill="#9C8060" fill-opacity="0.18"/>
  <rect x="180" y="280" width="440" height="80" fill="#8C7050" fill-opacity="0.1" rx="40"/>
  <!-- Water shimmer -->
  <ellipse cx="400" cy="345" rx="200" ry="50" fill="white" fill-opacity="0.12"/>
  <text x="400" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#7A6040" fill-opacity="0.28" letter-spacing="5">SORA SUITE WITH BATHTUB</text>
  <text x="400" y="149" text-anchor="middle" font-family="monospace" font-size="9" fill="#7A6040" fill-opacity="0.2" letter-spacing="2">Replace with: /images/room-sora-bathtub.jpg</text>
</svg>
