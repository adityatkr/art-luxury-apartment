<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C2840"/>
      <stop offset="45%" stop-color="#2C3C58"/>
      <stop offset="100%" stop-color="#384860"/>
    </linearGradient>
    <radialGradient id="horizon" cx="50%" cy="65%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8090B0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8090B0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="70%" cy="20%" r="8%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0E8D0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F0E8D0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="560" fill="url(#sky)"/>
  <rect width="800" height="560" fill="url(#horizon)"/>
  <rect width="800" height="560" fill="url(#moon)"/>
  <!-- City skyline silhouette -->
  <rect x="0" y="420" width="800" height="140" fill="#141E2C" fill-opacity="0.6"/>
  <rect x="50" y="380" width="40" height="180" fill="#141E2C" fill-opacity="0.5"/>
  <rect x="120" y="360" width="60" height="200" fill="#141E2C" fill-opacity="0.6"/>
  <rect x="200" y="390" width="35" height="170" fill="#141E2C" fill-opacity="0.5"/>
  <rect x="600" y="370" width="55" height="190" fill="#141E2C" fill-opacity="0.6"/>
  <rect x="680" y="350" width="45" height="210" fill="#141E2C" fill-opacity="0.55"/>
  <rect x="740" y="400" width="60" height="160" fill="#141E2C" fill-opacity="0.5"/>
  <!-- City lights -->
  <rect x="130" y="380" width="4" height="3" fill="#F4C860" fill-opacity="0.4"/>
  <rect x="148" y="392" width="4" height="3" fill="#F4C860" fill-opacity="0.3"/>
  <rect x="615" y="388" width="4" height="3" fill="#F4C860" fill-opacity="0.4"/>
  <rect x="695" y="365" width="4" height="3" fill="#F4C860" fill-opacity="0.35"/>
  <text x="400" y="230" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#B0C0D8" fill-opacity="0.35" letter-spacing="8">KAFFEE STORIES</text>
  <text x="400" y="252" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#90A0B8" fill-opacity="0.25" letter-spacing="4">ROOFTOP CAFÉ</text>
  <text x="400" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="white" fill-opacity="0.1" letter-spacing="2">Replace with: /images/restaurant-kaffee.jpg</text>
</svg>
